spring.application.name=DocumentAnalyser

server.port=8080

# ── PostgreSQL ───────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/document_analyser_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Liquibase ────────────────────────────────────────────────────
# Force Liquibase to run
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml


# ── JPA ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ── Logging
logging.level.liquibase=DEBUG
logging.level.org.springframework.boot.autoconfigure.liquibase=DEBUG

# ── Ollama ───────────────────────────────────────────────────────
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.2
spring.ai.ollama.embedding.model=nomic-embed-text

# ── PGVector ─────────────────────────────────────────────────────
# Set to true on first run only — creates vector_store table
spring.ai.vectorstore.pgvector.initialize-schema=true
# nomic-embed-text produces 768-dimension vectors
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# ── File upload ──────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB






